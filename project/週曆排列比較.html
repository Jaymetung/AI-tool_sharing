<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<title>週曆排列方式比較 — 三種設計探索</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap">
<style>
:root {
  --bg: #faf9f5;
  --surface: #ffffff;
  --surface-2: #f5f3ec;
  --surface-3: #ebe9e0;
  --text: #1a1a17;
  --text-2: #4b4a44;
  --text-dim: #87867f;
  --text-faint: #b0afa6;
  --border: #e4e1d8;
  --border-2: #d3d0c5;
  --accent: #4f46e5;
  --sans: "Noto Sans TC", -apple-system, BlinkMacSystemFont, sans-serif;
  --mono: "IBM Plex Mono", ui-monospace, monospace;

  /* status palette (matches main app) */
  --st-active: #0d8a36;
  --st-active-s: #dcf4e3;
  --st-upcoming: #1e6cff;
  --st-upcoming-s: #e3edff;
  --st-booked: #b97309;
  --st-booked-s: #fcf0d6;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
}

.page {
  max-width: 1480px;
  margin: 0 auto;
  padding: 56px 48px 80px;
}

/* ===== Header ===== */
.intro__eyebrow {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 12px;
}
.intro__title {
  font-size: 40px;
  font-weight: 600;
  letter-spacing: -0.02em;
  line-height: 1.15;
  margin: 0 0 14px;
  max-width: 880px;
}
.intro__lede {
  font-size: 16px;
  color: var(--text-2);
  max-width: 760px;
  line-height: 1.65;
  margin: 0;
}
.intro__lede strong { color: var(--text); font-weight: 500; }

.problem {
  margin-top: 36px;
  padding: 18px 22px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-left: 3px solid var(--accent);
  border-radius: 8px;
  display: flex;
  gap: 18px;
  align-items: flex-start;
}
.problem__tag {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--accent);
  background: color-mix(in oklab, var(--accent) 10%, white);
  padding: 3px 8px;
  border-radius: 4px;
  white-space: nowrap;
  margin-top: 1px;
}
.problem__body { font-size: 13.5px; color: var(--text-2); line-height: 1.6; }
.problem__body strong { color: var(--text); }

/* ===== Variation block ===== */
.variation {
  margin-top: 56px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
}
.var__head {
  padding: 22px 28px 18px;
  border-bottom: 1px solid var(--border);
  display: grid;
  grid-template-columns: auto 1fr auto;
  gap: 20px;
  align-items: center;
}
.var__badge {
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.04em;
  width: 36px;
  height: 36px;
  border-radius: 9px;
  background: var(--text);
  color: var(--surface);
  display: grid; place-items: center;
}
.var__title-block h2 {
  font-size: 22px;
  font-weight: 600;
  margin: 0;
  letter-spacing: -0.01em;
}
.var__sub {
  font-size: 12.5px;
  color: var(--text-dim);
  margin-top: 2px;
  font-family: var(--mono);
}
.var__tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  justify-content: flex-end;
}
.var__tag {
  font-family: var(--mono);
  font-size: 10.5px;
  font-weight: 500;
  padding: 4px 9px;
  border-radius: 12px;
  background: var(--surface-2);
  color: var(--text-2);
  border: 1px solid var(--border);
  letter-spacing: 0.02em;
}
.var__tag.is-pro { background: #e9f7ec; color: #167a3a; border-color: #c8e8d2; }
.var__tag.is-con { background: #fbe9e5; color: #9d2f1f; border-color: #f0cabf; }

.var__demo {
  padding: 28px;
  background: linear-gradient(180deg, var(--surface-2) 0%, var(--surface) 100%);
  border-bottom: 1px solid var(--border);
}

.var__analysis {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 1px;
  background: var(--border);
}
.anal {
  background: var(--surface);
  padding: 18px 22px 20px;
}
.anal__label {
  font-family: var(--mono);
  font-size: 10.5px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.anal__mark {
  width: 14px; height: 14px;
  border-radius: 3px;
  display: inline-grid; place-items: center;
  font-size: 10px;
  font-weight: 700;
  color: var(--surface);
}
.anal--why  .anal__mark { background: #6b6a64; }
.anal--pro  .anal__mark { background: var(--st-active); }
.anal--con  .anal__mark { background: #c43a2a; }
.anal--ref  .anal__mark { background: var(--accent); }

.anal__list {
  list-style: none;
  padding: 0; margin: 0;
  display: flex; flex-direction: column;
  gap: 6px;
}
.anal__list li {
  font-size: 13px;
  color: var(--text-2);
  line-height: 1.55;
  padding-left: 14px;
  position: relative;
}
.anal__list li::before {
  content: "";
  position: absolute;
  left: 2px;
  top: 9px;
  width: 4px; height: 4px;
  border-radius: 50%;
  background: var(--text-faint);
}
.anal__list li strong { color: var(--text); font-weight: 500; }

.ref-list { display: flex; flex-direction: column; gap: 8px; }
.ref-row {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 10px;
  align-items: start;
  padding: 6px 8px;
  background: var(--surface-2);
  border-radius: 6px;
  font-size: 12.5px;
}
.ref-row__name {
  font-weight: 600;
  color: var(--text);
}
.ref-row__why { color: var(--text-dim); font-size: 11.5px; line-height: 1.4; margin-top: 2px; }
.ref-row__logo {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 600;
  background: var(--text);
  color: var(--surface);
  width: 24px; height: 24px;
  border-radius: 5px;
  display: grid; place-items: center;
  letter-spacing: 0;
}

/* ===== Shared week-grid structure ===== */
.wk {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  display: grid;
  font-size: 12px;
}

/* === Variation A: Lanes === */
.wkA {
  grid-template-columns: 52px repeat(7, 1fr);
}
.wkA__corner, .wkA__hday {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  border-right: 1px solid var(--border);
  padding: 8px 6px;
  text-align: center;
}
.wkA__hday:last-child { border-right: 0; }
.wkA__hday-w { font-size: 10px; color: var(--text-dim); letter-spacing: 0.04em; }
.wkA__hday-d { font-family: var(--mono); font-size: 16px; font-weight: 500; }
.wkA__gutter {
  border-right: 1px solid var(--border);
  background: var(--surface);
  position: relative;
}
.wkA__hour {
  height: 48px;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-dim);
  text-align: right;
  padding: 1px 6px 0 0;
  border-bottom: 1px dashed var(--border);
}
.wkA__col {
  position: relative;
  border-right: 1px solid var(--border);
  background: var(--surface);
}
.wkA__col:last-child { border-right: 0; }
.wkA__col-bg {
  position: absolute; inset: 0;
  background-image: repeating-linear-gradient(
    180deg,
    transparent 0 47px,
    var(--border) 47px 48px
  );
  pointer-events: none;
}
.evtA {
  position: absolute;
  border-radius: 4px;
  padding: 4px 6px;
  font-size: 10.5px;
  line-height: 1.25;
  color: var(--text);
  background: var(--s);
  border-left: 2px solid var(--c);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  gap: 1px;
}
.evtA__time {
  font-family: var(--mono);
  font-size: 9px;
  color: var(--text-dim);
}
.evtA__name {
  font-weight: 600;
  color: var(--c);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.evtA__user {
  font-size: 10px;
  color: var(--text-2);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* === Variation B: Tool Swimlanes === */
.wkB { display: block; }
.wkB__head {
  display: grid;
  grid-template-columns: 110px repeat(7, 1fr);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}
.wkB__corner { padding: 12px 14px; font-size: 11px; color: var(--text-dim); font-family: var(--mono); border-right: 1px solid var(--border); }
.wkB__hday {
  padding: 8px 0;
  border-right: 1px solid var(--border);
  text-align: center;
}
.wkB__hday:last-child { border-right: 0; }
.wkB__hday-w { font-size: 10px; color: var(--text-dim); }
.wkB__hday-d { font-family: var(--mono); font-size: 14px; font-weight: 500; margin-top: 1px; }
.wkB__row {
  display: grid;
  grid-template-columns: 110px repeat(7, 1fr);
  border-bottom: 1px solid var(--border);
}
.wkB__row:last-child { border-bottom: 0; }
.wkB__label {
  display: flex; align-items: center; gap: 8px;
  padding: 0 12px;
  background: var(--surface-2);
  border-right: 1px solid var(--border);
  font-size: 12px;
}
.wkB__logo {
  width: 18px; height: 18px;
  border-radius: 4px;
  background: var(--text);
  color: var(--surface);
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 600;
  display: grid; place-items: center;
  flex-shrink: 0;
}
.wkB__lname { font-weight: 500; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.wkB__cell {
  position: relative;
  height: 56px;
  border-right: 1px solid var(--border);
  background: repeating-linear-gradient(
    90deg,
    transparent 0 calc(100% / 9 - 1px),
    var(--surface-2) calc(100% / 9 - 1px) calc(100% / 9)
  );
}
.wkB__cell:last-child { border-right: 0; }
.evtB {
  position: absolute;
  top: 10px; bottom: 10px;
  background: var(--s);
  border-left: 2px solid var(--c);
  border-radius: 4px;
  padding: 3px 6px;
  font-size: 10.5px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  overflow: hidden;
}
.evtB__time { font-family: var(--mono); font-size: 9px; color: var(--text-dim); }
.evtB__user { font-size: 10px; font-weight: 600; color: var(--c); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* === Variation C: Compact Agenda === */
.wkC {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
}
.wkC__col {
  border-right: 1px solid var(--border);
  background: var(--surface);
  display: flex;
  flex-direction: column;
}
.wkC__col:last-child { border-right: 0; }
.wkC__head {
  padding: 12px 12px 10px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 8px;
}
.wkC__head-l { display: flex; align-items: baseline; gap: 8px; }
.wkC__week { font-size: 10px; color: var(--text-dim); }
.wkC__day  { font-family: var(--mono); font-size: 18px; font-weight: 500; letter-spacing: -0.01em; }
.wkC__count {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-dim);
  background: var(--surface-2);
  padding: 2px 7px;
  border-radius: 8px;
}
.wkC__hours {
  display: flex;
  align-items: center;
  gap: 1px;
  padding: 8px 12px 6px;
  height: 22px;
}
.wkC__hbar {
  flex: 1;
  height: 100%;
  border-radius: 2px;
  background: var(--surface-2);
  position: relative;
}
.wkC__hbar.is-on {
  background: var(--c, var(--st-upcoming));
  opacity: var(--op, 1);
}
.wkC__hlbl {
  font-family: var(--mono);
  font-size: 8.5px;
  color: var(--text-faint);
  padding: 0 12px 6px;
  display: flex;
  justify-content: space-between;
}
.wkC__list {
  padding: 4px 8px 12px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.evtC {
  display: grid;
  grid-template-columns: 38px 1fr auto;
  gap: 8px;
  align-items: center;
  padding: 6px 8px;
  background: var(--s);
  border-radius: 5px;
  border-left: 2px solid var(--c);
}
.evtC__time {
  font-family: var(--mono);
  font-size: 10px;
  color: var(--text-2);
  font-weight: 500;
  line-height: 1.25;
}
.evtC__body { min-width: 0; }
.evtC__name {
  display: flex; align-items: center; gap: 5px;
  font-size: 12px; font-weight: 600;
  color: var(--c);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.evtC__logo {
  width: 13px; height: 13px;
  border-radius: 3px;
  background: var(--text);
  color: var(--surface);
  font-size: 9px;
  font-family: var(--mono);
  display: inline-grid; place-items: center;
  flex-shrink: 0;
}
.evtC__user {
  font-size: 10.5px; color: var(--text-2);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.evtC__dur {
  font-family: var(--mono);
  font-size: 9.5px;
  color: var(--text-dim);
}
.wkC__empty {
  text-align: center;
  font-size: 11px;
  color: var(--text-faint);
  padding: 14px 0;
}

/* Status palette helper classes */
.st-active   { --c: var(--st-active);   --s: var(--st-active-s); }
.st-upcoming { --c: var(--st-upcoming); --s: var(--st-upcoming-s); }
.st-booked   { --c: var(--st-booked);   --s: var(--st-booked-s); }

/* ===== Final comparison table ===== */
.compare {
  margin-top: 56px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
}
.compare__head {
  padding: 22px 28px;
  border-bottom: 1px solid var(--border);
}
.compare__head h2 {
  margin: 0 0 4px;
  font-size: 20px;
  font-weight: 600;
  letter-spacing: -0.01em;
}
.compare__head p {
  margin: 0;
  color: var(--text-dim);
  font-size: 13px;
}
.compare__tbl {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
.compare__tbl th, .compare__tbl td {
  padding: 14px 22px;
  text-align: left;
  border-bottom: 1px solid var(--border);
  vertical-align: top;
}
.compare__tbl th {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--text-dim);
  background: var(--surface-2);
  width: 18%;
}
.compare__tbl thead th { width: auto; }
.compare__tbl tbody tr:last-child td { border-bottom: 0; }
.compare__head-cell {
  display: flex; align-items: center; gap: 8px;
}
.compare__head-cell span {
  font-family: var(--mono);
  font-size: 11px;
  width: 22px; height: 22px;
  background: var(--text); color: var(--surface);
  border-radius: 5px;
  display: grid; place-items: center;
  font-weight: 600;
}
.score {
  display: inline-flex;
  gap: 2px;
}
.score__pip {
  width: 9px; height: 9px;
  border-radius: 2px;
  background: var(--surface-3);
}
.score__pip.is-on { background: var(--text); }
.cell-note {
  font-size: 11.5px;
  color: var(--text-dim);
  margin-top: 4px;
  line-height: 1.4;
}

/* ===== Recommendation ===== */
.reco {
  margin-top: 28px;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
}
.reco__card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 18px 20px;
}
.reco__card h4 {
  margin: 0 0 4px;
  font-size: 13px;
  display: flex; align-items: center; gap: 8px;
}
.reco__card h4 span {
  font-family: var(--mono);
  font-size: 11px;
  background: var(--text); color: var(--surface);
  border-radius: 4px;
  padding: 2px 7px;
  font-weight: 600;
}
.reco__card p {
  margin: 6px 0 0;
  font-size: 12.5px;
  color: var(--text-2);
  line-height: 1.55;
}

.foot {
  margin-top: 60px;
  text-align: center;
  font-size: 12px;
  color: var(--text-faint);
  font-family: var(--mono);
}
</style>
</head>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel">
// === Sample data: one week, designed to expose layout strengths/weaknesses ===
const TOOLS = [
  { id: "chatgpt",    name: "ChatGPT Team",  glyph: "G" },
  { id: "claude",     name: "Claude Pro",     glyph: "C" },
  { id: "midjourney", name: "Midjourney",     glyph: "M" },
  { id: "cursor",     name: "Cursor Pro",     glyph: "U" },
  { id: "copilot",    name: "Copilot",        glyph: "H" },
  { id: "gemini",     name: "Gemini",         glyph: "N" },
];

const DAYS = ["週一","週二","週三","週四","週五","週六","週日"];
const DATES = [18, 19, 20, 21, 22, 23, 24];
const HOURS = [9, 10, 11, 12, 13, 14, 15, 16, 17];
const HOUR_COUNT = HOURS.length;

// Designed sample bookings — covers easy, medium, conflict-heavy days.
const SB = [
  // 週一 — light
  { day: 0, start: 9,  end: 12, tool: "chatgpt",    user: "陳", status: "upcoming" },
  { day: 0, start: 14, end: 17, tool: "cursor",     user: "王", status: "upcoming" },
  // 週二 — moderate (2 overlap 10-12)
  { day: 1, start: 9,  end: 11, tool: "claude",     user: "林", status: "upcoming" },
  { day: 1, start: 10, end: 14, tool: "midjourney", user: "張", status: "upcoming" },
  { day: 1, start: 13, end: 16, tool: "copilot",    user: "黃", status: "upcoming" },
  // 週三 — TODAY, conflict-heavy (4 overlap 14-15)
  { day: 2, start: 9,  end: 18, tool: "copilot",    user: "黃", status: "active" },
  { day: 2, start: 10, end: 12, tool: "chatgpt",    user: "陳", status: "active" },
  { day: 2, start: 11, end: 14, tool: "claude",     user: "林", status: "active" },
  { day: 2, start: 13, end: 15, tool: "midjourney", user: "張", status: "active" },
  { day: 2, start: 14, end: 17, tool: "cursor",     user: "王", status: "active" },
  { day: 2, start: 14, end: 16, tool: "gemini",     user: "周", status: "active" },
  // 週四 — moderate, with short and long sessions
  { day: 3, start: 9,  end: 10, tool: "chatgpt",    user: "李", status: "booked" },
  { day: 3, start: 10, end: 16, tool: "claude",     user: "黃", status: "booked" },
  { day: 3, start: 13, end: 14, tool: "gemini",     user: "周", status: "booked" },
  // 週五 — moderate
  { day: 4, start: 9,  end: 12, tool: "cursor",     user: "王", status: "booked" },
  { day: 4, start: 14, end: 18, tool: "chatgpt",    user: "陳", status: "booked" },
  { day: 4, start: 13, end: 16, tool: "midjourney", user: "張", status: "booked" },
  // 週六/週日 — sparse
  { day: 5, start: 10, end: 12, tool: "claude",     user: "李", status: "booked" },
  { day: 6, start: 14, end: 16, tool: "chatgpt",    user: "陳", status: "booked" },
];

const toolById = Object.fromEntries(TOOLS.map(t => [t.id, t]));

// Helpers
function laneAssign(events) {
  // Sort by start. Assign each event to the earliest lane whose last event ended before this starts.
  const sorted = events.slice().sort((a, b) => a.start - b.start || b.end - a.end);
  const lanes = []; // each lane = last end hour
  return sorted.map(e => {
    let li = lanes.findIndex(end => end <= e.start);
    if (li === -1) { lanes.push(e.end); li = lanes.length - 1; }
    else lanes[li] = e.end;
    return { ...e, lane: li, totalLanes: lanes.length };
  }).map((e, _, arr) => ({ ...e, totalLanes: Math.max(...arr.map(x => x.lane + 1)) }));
}

function WeekViewA() {
  const HOUR_PX = 48;
  return (
    <div className="wk wkA">
      <div className="wkA__corner" />
      {DAYS.map((d, i) => (
        <div key={i} className="wkA__hday">

          <div className="wkA__hday-d">{DATES[i]}</div>

      ))}
      <div className="wkA__gutter">
        {HOURS.map(h => <div key={h} className="wkA__hour">{String(h).padStart(2,"0")}:00</div>)}
      </div>
      {DAYS.map((_, di) => {
        const dayEvents = SB.filter(b => b.day === di);
        const placed = laneAssign(dayEvents);
        return (
          <div key={di} className="wkA__col" style={{ height: `${HOURS.length * HOUR_PX}px` }}>
            <div className="wkA__col-bg" />
            {placed.map((e, ei) => {
              const tool = toolById[e.tool];
              const top = (e.start - 9) * HOUR_PX;
              const height = (e.end - e.start) * HOUR_PX - 2;
              const width = `calc((100% - 4px) / ${e.totalLanes})`;
              const left = `calc(${e.lane} * (100% - 4px) / ${e.totalLanes} + 2px)`;
              return (
                <div key={ei}
                  className={`evtA st-${e.status}`}
                  style={{ top, height, width, left }}
                >
                  <div className="evtA__time">{String(e.start).padStart(2,"0")}–{String(e.end).padStart(2,"0")}</div>
                  <div className="evtA__name">{tool.name}</div>
                  {height > 38 && <div className="evtA__user">{e.user}</div>}
                </div>
              );
            })}
          </div>
        );
      })}
    </div>
  );
}

// ============ Variation C: Compact Agenda ============
function WeekViewC() {
  // For each day: build hour-coverage bar + sorted list of bookings.
  return (
    <div className="wk wkC">
      {DAYS.map((d, di) => {
        const events = SB.filter(b => b.day === di).sort((a, b) => a.start - b.start);
        // Coverage by hour — count of overlapping bookings.
        const coverage = HOURS.map(h => events.filter(e => e.start <= h && e.end > h).length);
        const maxCov = Math.max(1, ...coverage);
        return (
          <div key={di} className="wkC__col">
            <div className="wkC__head">
              <div className="wkC__head-l">
                <span className="wkC__week">{d}</span>
                <span className="wkC__day">{DATES[di]}</span>
              </div>
              <span className="wkC__count">{events.length} 筆</span>
            </div>
            <div className="wkC__hours">
              {coverage.map((c, hi) => {
                const op = c === 0 ? 0.18 : (0.4 + 0.6 * (c / maxCov));
                return (
                  <span key={hi}
                    className={c > 0 ? "wkC__hbar is-on" : "wkC__hbar"}
                    style={{
                      "--c": di === 2 ? "var(--st-active)" : di < 2 ? "var(--st-upcoming)" : "var(--st-booked)",
                      "--op": op,
                    }}
                    title={`${HOURS[hi]}:00 · ${c} 筆`}
                  />
                );
              })}
            </div>
            <div className="wkC__hlbl"><span>9</span><span>13</span><span>18</span></div>
            <div className="wkC__list">
              {events.length === 0 ? (
                <div className="wkC__empty">無預約</div>
              ) : events.map((e, ei) => {
                const tool = toolById[e.tool];
                const dur = e.end - e.start;
                return (
                  <div key={ei} className={`evtC st-${e.status}`}>
                    <div className="evtC__time">
                      <div>{String(e.start).padStart(2,"0")}</div>
                      <div style={{ color: "var(--text-faint)" }}>{String(e.end).padStart(2,"0")}</div>
                    </div>
                    <div className="evtC__body">
                      <div className="evtC__name">
                        <span className="evtC__logo">{tool.glyph}</span>
                        {tool.name}
                      </div>
                      <div className="evtC__user">{e.user}</div>
                    </div>
                    <div className="evtC__dur">{dur}h</div>
                  </div>
                );
              })}
            </div>
          </div>
        );
      })}
    </div>
  );
}
